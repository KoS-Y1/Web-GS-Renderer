<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WebGPU Gaussian Splatting Renderer</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
<canvas id="gpu-canvas"></canvas>
<div id="loading">
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading…</div>
</div>
<div id="dropzone" class="hidden">
    <div class="dropzone-card">
        <div class="dropzone-title">Drop a Gaussian Splatting <code>.ply</code> file</div>
        <div class="dropzone-hint">drag it anywhere on this page</div>
        <button id="dropzone-browse" type="button">Browse…</button>
    </div>
</div>
<script type="module" src="./src/main.js"></script>
</body>
</html>
